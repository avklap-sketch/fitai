<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FitAI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>

</head>

<body>

<h2>🔥 FitAI PRO</h2>

<p>Введи свой вес:</p>

<input id="w" placeholder="Например: 70">

<br><br>

<button onclick="save()">💾 Сохранить</button>

<br><br>

<button onclick="sendData('workout')">🏋️ Тренировки</button>
<button onclick="sendData('food')">🍽 Питание</button>

<script>
let tg = window.Telegram.WebApp;

// раскрыть приложение на весь экран
tg.expand();

function save() {
    let w = document.getElementById("w").value;

    if (!w) {
        alert("Введи вес");
        return;
    }

    tg.sendData("weight:" + w);
}

function sendData(type) {
    tg.sendData(type);
}
</script>

</body>
</html>
